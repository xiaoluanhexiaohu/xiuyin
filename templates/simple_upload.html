<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>一键修音</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="card">
    <h1>一键修音</h1>
    <p class="hint">上传原唱和你的录音，系统会自动分析并修音，完成后自动下载结果压缩包。</p>
    <form id="uploadForm">
      <section id="referenceSearchPanel" class="reference-search-panel" aria-label="搜索原唱音乐">
        <h2>搜索原唱音乐</h2>
        <p class="hint">可搜索 Jamendo / Freesound 的可授权音频并导入；Spotify / YouTube 仅展示歌曲信息，不能后台导入音频。</p>
        <div class="reference-search-controls">
          <label>关键词
            <input id="referenceSearchQuery" type="search" placeholder="输入歌曲名或歌手名" autocomplete="off" />
          </label>
          <label>来源
            <select id="referenceSearchSource">
              <option value="jamendo">Jamendo</option>
              <option value="freesound">Freesound</option>
              <option value="spotify">Spotify</option>
              <option value="youtube">YouTube</option>
            </select>
          </label>
          <button id="referenceSearchButton" type="button">搜索</button>
        </div>
        <p id="referenceSearchStatus" class="hint">请输入歌曲名或歌手名后搜索。</p>
        <div id="selectedReferenceAudio" class="selected-reference" hidden></div>
        <ul id="referenceSearchResults" class="reference-results" aria-live="polite"></ul>
      </section>
      <label>原唱音频<input id="referenceAudioInput" type="file" name="reference_audio" accept=".wav,.mp3,.m4a,.flac,audio/*" required /></label>
      <label>我的录音<input id="userAudioInput" type="file" name="user_audio" accept=".wav,.mp3,.m4a,.flac,.webm,.mp4,audio/*" required /></label>
      <section id="recorderPanel" class="recorder-panel" aria-label="浏览器录音面板">
        <h2>直接录音</h2>
        <p class="hint">可使用浏览器麦克风录制我的录音，优先 webm/opus，单次最多 10 分钟或 20MB。</p>
        <div class="recorder-actions">
          <button id="recordStart" type="button">开始录音</button>
          <button id="recordStop" type="button" disabled>停止录音</button>
          <button id="recordReset" type="button" disabled>重录</button>
        </div>
        <audio id="recordPreview" controls hidden></audio>
        <p id="recordStatus" class="hint">未开始录音</p>
      </section>
      <details>
        <summary>高级设置</summary>
        <label>修音强度<input name="correction_strength" type="number" min="0" max="1" step="0.05" value="0.75" /></label>
        <label>保留颤音比例<input name="keep_vibrato_ratio" type="number" min="0" max="1" step="0.05" value="0.6" /></label>
        <label>最大修正幅度<input name="max_shift_cents" type="number" min="1" step="10" value="300" /></label>
        <label>音节分段粒度
          <select name="syllable_granularity">
            <option value="conservative" selected>保守</option>
            <option value="normal">标准</option>
            <option value="aggressive">细致（可能产生不自然效果）</option>
          </select>
        </label>
      </details>
      <button id="startButton" type="submit">开始修音</button>
    </form>
    <section class="status-panel">
      <p id="statusText">等待上传</p>
      <progress id="progress" value="0" max="1"></progress>
      <p id="warningText" class="warning"></p>
      <div id="downloadLinks" class="links" hidden></div>
    </section>
  </main>
  <script src="/static/simple_upload.js"></script>
</body>
</html>
